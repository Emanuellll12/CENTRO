<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMG PDV - Login</title>
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #6c059b 0%, #4a0470 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 150px;
            height: 100px;
            background: white;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .logo img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .logo-text {
            font-size: 48px;
            font-weight: 900;
            color: #6c059b;
        }

        .app-title {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .app-subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f3f4f6;
            padding: 5px;
            border-radius: 12px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #6b7280;
        }

        .tab.active {
            background: white;
            color: #6c059b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #6c059b;
            box-shadow: 0 0 0 3px rgba(108, 5, 155, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c059b 0%, #4a0470 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 5, 155, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.active {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #9ca3af;
            font-size: 14px;
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: #6c059b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .form-help {
            font-size: 13px;
            color: #6b7280;
            margin-top: 6px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 14px;
            color: #374151;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo">
                <div class="logo-text">OMG</div>
            </div>
            <h1 class="app-title">PDV Sistema</h1>
            <p class="app-subtitle">Gestão completa para sua loja</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="trocarAba('login')">Entrar</button>
                <button class="tab" onclick="trocarAba('cadastro')">Criar Conta</button>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <!-- FORMULÁRIO DE LOGIN -->
            <div class="form-content active" id="form-login">
                <form onsubmit="fazerLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input 
                            type="email" 
                            class="form-input" 
                            id="loginEmail" 
                            placeholder="seu@email.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">Senha</label>
                        <input 
                            type="password" 
                            class="form-input" 
                            id="loginSenha" 
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary" id="btnLogin">
                        Entrar
                    </button>

                    <div class="forgot-password">
                        <a href="#" onclick="esqueceuSenha(); return false;">Esqueceu sua senha?</a>
                    </div>
                </form>
            </div>

            <!-- FORMULÁRIO DE CADASTRO -->
            <div class="form-content" id="form-cadastro">
                <form onsubmit="criarConta(event)">
                    <div class="form-group">
                        <label class="form-label">Nome da Loja *</label>
                        <input 
                            type="text" 
                            class="form-input" 
                            id="cadastroNomeLoja" 
                            placeholder="Loja Centro"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">CNPJ (opcional)</label>
                        <input 
                            type="text" 
                            class="form-input" 
                            id="cadastroCnpj" 
                            placeholder="12.345.678/0001-90"
                            maxlength="18"
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input 
                            type="email" 
                            class="form-input" 
                            id="cadastroEmail" 
                            placeholder="seu@email.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">Senha *</label>
                        <input 
                            type="password" 
                            class="form-input" 
                            id="cadastroSenha" 
                            placeholder="Mínimo 6 caracteres"
                            minlength="6"
                            required
                        >
                        <p class="form-help">A senha deve ter no mínimo 6 caracteres</p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirmar Senha *</label>
                        <input 
                            type="password" 
                            class="form-input" 
                            id="cadastroSenhaConfirm" 
                            placeholder="Digite a senha novamente"
                            required
                        >
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="termos" required>
                        <label for="termos">Aceito os termos de uso e política de privacidade</label>
                    </div>

                    <button type="submit" class="btn btn-primary" id="btnCadastro">
                        Criar Conta e Loja
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO SUPABASE ====================
        const SUPABASE_URL = 'https://azfpzrqnkjifgfvxxnch.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_GGFVLYVtjOv59khwvY-RTQ_ZGi9qWbF';
        
        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✅ Supabase inicializado');
        } catch (error) {
            console.error('❌ Erro ao inicializar Supabase:', error);
        }

        // ==================== TROCAR ABAS ====================
        function trocarAba(aba) {
            // Limpar mensagens
            esconderMensagens();

            // Atualizar tabs
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // Atualizar conteúdo
            document.querySelectorAll('.form-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`form-${aba}`).classList.add('active');
        }

        // ==================== FAZER LOGIN ====================
        async function fazerLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;
            const btnLogin = document.getElementById('btnLogin');

            try {
                esconderMensagens();
                btnLogin.disabled = true;
                btnLogin.innerHTML = '<span class="loading"></span> Entrando...';

                console.log('1️⃣ Tentando login:', email);

                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: senha
                });

                if (error) throw error;

                console.log('✅ Login bem-sucedido:', data.user.id);
                console.log('2️⃣ Buscando loja do usuário...');

                // Verificar se usuário tem loja
                const { data: usuarioLoja, error: lojaError } = await supabaseClient
                    .from('usuarios_loja')
                    .select('loja_id, cargo')
                    .eq('user_id', data.user.id)
                    .maybeSingle();

                console.log('Resultado da busca:', usuarioLoja);
                console.log('Erro (se houver):', lojaError);

                if (lojaError) {
                    console.error('❌ Erro SQL:', lojaError);
                    throw new Error('Erro ao buscar loja: ' + lojaError.message);
                }

                if (!usuarioLoja) {
                    console.error('❌ Nenhum registro encontrado em usuarios_loja');
                    
                    // Tentar buscar loja pelo owner_id
                    console.log('3️⃣ Verificando se existe loja com owner_id...');
                    const { data: lojaOrfa, error: lojaBuscaError } = await supabaseClient
                        .from('lojas')
                        .select('id, nome')
                        .eq('owner_id', data.user.id)
                        .maybeSingle();

                    if (lojaOrfa) {
                        console.warn('⚠️ Loja encontrada mas não associada:', lojaOrfa);
                        throw new Error(
                            `Loja encontrada mas não associada ao usuário.\n\n` +
                            `Loja: ${lojaOrfa.nome}\n` +
                            `ID: ${lojaOrfa.id}\n\n` +
                            `Abra diagnostico.html e clique em "Tentar Corrigir"`
                        );
                    } else {
                        console.error('❌ Nenhuma loja encontrada');
                        throw new Error(
                            'Conta criada mas sem loja associada.\n\n' +
                            'Soluções:\n' +
                            '1. Abra diagnostico.html e clique em "Tentar Corrigir"\n' +
                            '2. OU crie uma nova conta (o sistema foi corrigido)'
                        );
                    }
                }

                console.log('✅ Loja encontrada:', usuarioLoja);

                // Salvar dados no localStorage
                localStorage.setItem('user_id', data.user.id);
                localStorage.setItem('user_email', data.user.email);
                localStorage.setItem('loja_id', usuarioLoja.loja_id);
                localStorage.setItem('cargo', usuarioLoja.cargo);

                mostrarSucesso('Login realizado com sucesso!');
                
                setTimeout(() => {
                    window.location.href = 'VENDAS.html';
                }, 1000);

            } catch (error) {
                console.error('❌ Erro no login:', error);
                
                // Formatar mensagem de erro
                let mensagemErro = error.message;
                if (error.message.includes('Invalid login credentials')) {
                    mensagemErro = 'Email ou senha incorretos';
                }
                
                mostrarErro(mensagemErro);
                btnLogin.disabled = false;
                btnLogin.innerHTML = 'Entrar';
            }
        }

        // ==================== CRIAR CONTA ====================
        async function criarConta(event) {
            event.preventDefault();

            const nomeLoja = document.getElementById('cadastroNomeLoja').value;
            const cnpj = document.getElementById('cadastroCnpj').value;
            const email = document.getElementById('cadastroEmail').value;
            const senha = document.getElementById('cadastroSenha').value;
            const senhaConfirm = document.getElementById('cadastroSenhaConfirm').value;
            const btnCadastro = document.getElementById('btnCadastro');

            try {
                esconderMensagens();

                // Validar senhas
                if (senha !== senhaConfirm) {
                    throw new Error('As senhas não coincidem');
                }

                btnCadastro.disabled = true;
                btnCadastro.innerHTML = '<span class="loading"></span> Criando conta...';

                console.log('1️⃣ Criando usuário no Supabase Auth...');

                // 1. Criar usuário no Supabase Auth
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: senha,
                    options: {
                        data: {
                            nome_loja: nomeLoja
                        },
                        emailRedirectTo: window.location.origin + '/pdv.html'
                    }
                });

                if (authError) throw authError;
                
                if (!authData.user) {
                    throw new Error('Erro ao criar usuário');
                }

                console.log('✅ Usuário criado:', authData.user.id);

                // 2. Fazer login automático (para ter sessão ativa)
                console.log('2️⃣ Fazendo login automático...');
                const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: senha
                });

                if (loginError) {
                    console.warn('⚠️ Login automático falhou, tentando criar loja mesmo assim...');
                }

                // 3. Criar loja usando a function SQL (AGORA COM USER_ID)
                console.log('3️⃣ Criando loja para usuário:', authData.user.id);
                
                const { data: lojaData, error: lojaError } = await supabaseClient
                    .rpc('criar_loja_com_admin', {
                        p_user_id: authData.user.id,  // ✅ PASSAR O USER_ID
                        p_nome: nomeLoja,
                        p_email: email,
                        p_cnpj: cnpj || null
                    });

                if (lojaError) {
                    console.error('❌ Erro ao criar loja:', lojaError);
                    throw lojaError;
                }

                console.log('✅ Loja criada com ID:', lojaData);

                mostrarSucesso('✅ Conta e loja criadas com sucesso! Redirecionando...');

                // Salvar dados no localStorage
                localStorage.setItem('user_id', authData.user.id);
                localStorage.setItem('user_email', email);
                localStorage.setItem('loja_id', lojaData);
                localStorage.setItem('cargo', 'ADMIN');

                setTimeout(() => {
                    window.location.href = 'vendasPDV.html';
                }, 2000);

            } catch (error) {
                console.error('❌ Erro ao criar conta:', error);
                
                // Mensagem de erro mais amigável
                let mensagemErro = error.message;
                if (error.message.includes('User already registered')) {
                    mensagemErro = 'Email já cadastrado. Tente fazer login.';
                } else if (error.code === '23505') {
                    mensagemErro = 'Email ou CNPJ já cadastrado.';
                } else if (error.code === '23502') {
                    mensagemErro = 'Erro ao criar loja. Execute o SQL de correção: correcao-criar-loja.sql';
                }
                
                mostrarErro(mensagemErro);
                btnCadastro.disabled = false;
                btnCadastro.innerHTML = 'Criar Conta e Loja';
            }
        }

        // ==================== ESQUECEU SENHA ====================
        async function esqueceuSenha() {
            const email = prompt('Digite seu email para recuperação de senha:');
            
            if (!email) return;

            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/pdv.html'
                });

                if (error) throw error;

                mostrarSucesso('Email de recuperação enviado! Verifique sua caixa de entrada.');
            } catch (error) {
                console.error('Erro ao enviar email:', error);
                mostrarErro('Erro ao enviar email de recuperação');
            }
        }

        // ==================== MENSAGENS ====================
        function mostrarErro(mensagem) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = mensagem;
            errorDiv.classList.add('active');
        }

        function mostrarSucesso(mensagem) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = mensagem;
            successDiv.classList.add('active');
        }

        function esconderMensagens() {
            document.getElementById('errorMessage').classList.remove('active');
            document.getElementById('successMessage').classList.remove('active');
        }

        // ==================== MÁSCARA CNPJ ====================
        document.getElementById('cadastroCnpj')?.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            
            if (value.length <= 14) {
                value = value.replace(/^(\d{2})(\d)/, '$1.$2');
                value = value.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
                value = value.replace(/\.(\d{3})(\d)/, '.$1/$2');
                value = value.replace(/(\d{4})(\d)/, '$1-$2');
            }
            
            e.target.value = value;
        });

        // ==================== VERIFICAR SE JÁ ESTÁ LOGADO ====================
        async function verificarSessao() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (session) {
                console.log('✅ Usuário já está logado, redirecionando...');
                window.location.href = 'VENDAS.html';
            }
        }

        // Verificar ao carregar a página
        verificarSessao();
    </script>
</body>
</html>
